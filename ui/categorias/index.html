<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tagger — categorías</title>
    <link rel="stylesheet" href="/ui/shared/theme.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <script src="/ui/shared/state.js"></script>
    <script src="/ui/shared/toast.js"></script>
    <script src="/ui/shared/skeleton.js"></script>
    <script src="/ui/shared/api.js"></script>
    <script src="/ui/shared/nav.js"></script>
    <script src="/ui/shared/breadcrumbs.js"></script>
    <script src="/ui/shared/empty-state.js"></script>
    <script src="/ui/shared/tooltip.js"></script>
    <script src="/ui/shared/api-modal.js"></script>
    <script src="/ui/shared/footer.js" defer></script>

    <section class="page-actions">
      <h2>Categorías</h2>
      <div class="actions">
        <button id="btn-reload" class="btn btn-primary">↻ Reload</button>
        <button id="btn-new" class="btn">+ Nueva</button>
        <a href="/ui/recat/" class="btn">⚙ Re-procesar catálogo</a>
        <button
          id="btn-density"
          class="btn btn-ghost btn-sm"
          type="button"
          aria-label="Alternar densidad"
        >
          Densidad: normal
        </button>
        <span id="status" class="t-small t-muted"></span>
      </div>
    </section>

    <section
      id="conflictos-banner"
      class="card"
      style="
        display: none;
        margin: 0 20px 16px;
        padding: 12px 16px;
        border-left: 4px solid #d97706;
        background: rgba(217, 119, 6, 0.08);
      "
    >
      <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px">
        <div>
          <strong>⚠️ <span id="conflictos-count">0</span> patrón(es) duplicado(s)</strong>
          <div class="t-small t-muted" style="margin-top: 4px">
            Mismo (tipo, valor) activo en categorías distintas. El orden lo decide DB → resultado impredecible.
          </div>
        </div>
        <button id="conflictos-toggle" class="btn btn-sm">Ver detalle</button>
      </div>
      <div
        id="conflictos-detalle"
        style="display: none; margin-top: 12px; max-height: 360px; overflow: auto"
      ></div>
    </section>

    <section class="list" style="padding: 0 20px 20px">
      <table class="tbl">
        <thead>
          <tr>
            <th>Slug</th>
            <th>Nombre</th>
            <th>Movs</th>
            <th>
              MCC
              <span
                class="tagger-help"
                tabindex="0"
                data-tooltip="Merchant Category Code (ISO 18245). Cantidad de MCCs asociados a esta categoría como fallback."
                aria-label="Ayuda MCC"
                >?</span
              >
            </th>
            <th>Comercios</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="lista-cats"></tbody>
      </table>
    </section>

    <div id="modal-new" class="modal" style="display: none">
      <div class="modal-content">
        <h3>Nueva categoría</h3>
        <label
          >Slug <small>(a-z, 0-9, _, max 30)</small>
          <input id="new-slug" pattern="[a-z0-9_]+" required />
        </label>
        <label>Nombre <input id="new-nombre" required /></label>
        <label>Descripción <textarea id="new-desc"></textarea></label>
        <div class="modal-actions">
          <button id="btn-cancel" class="btn btn-ghost">Cancelar</button>
          <button id="btn-save" class="btn">Crear</button>
        </div>
        <div id="new-error" class="error"></div>
      </div>
    </div>

    <script src="app.js"></script>
    <script>
      (function () {
        const KEY = 'tagger:density';
        const btn = document.getElementById('btn-density');
        function apply(v) {
          document.documentElement.setAttribute('data-density', v);
          if (btn) btn.textContent = `Densidad: ${v}`;
        }
        apply(localStorage.getItem(KEY) || 'normal');
        btn?.addEventListener('click', () => {
          const next = (localStorage.getItem(KEY) || 'normal') === 'normal' ? 'compact' : 'normal';
          localStorage.setItem(KEY, next);
          apply(next);
        });
      })();
      window.taggerBreadcrumbs &&
        window.taggerBreadcrumbs([
          { label: 'Inicio', href: '/ui/index.html' },
          { label: 'Categorías' },
        ]);
      window.taggerApiModal &&
        window.taggerApiModal.register([
          { name: 'Listar categorías', method: 'GET', path: '/categorias' },
          {
            name: 'Crear categoría',
            method: 'POST',
            path: '/categorias',
            body: { slug: 'transporte', nombre: 'Transporte', descripcion: '...' },
          },
          { name: 'Listar patrones', method: 'GET', path: '/patrones' },
          { name: 'Listar comercios', method: 'GET', path: '/comercios?limit=50' },
          { name: 'Listar marcas IA', method: 'GET', path: '/marcas' },
          { name: 'Reprocesar catálogo', method: 'POST', path: '/admin/recat/catalogo' },
        ]);
    </script>
  </body>
</html>
