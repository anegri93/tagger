openapi: 3.1.0
info:
  title: tagger API
  description: |
    Servicio de categorización automática de movimientos bancarios.
    Pipeline en cascada: catálogo → patrones → MCC → IA fallback.
  version: 1.0.0
  contact:
    name: Mango Apps Paraguay

servers:
  - url: http://localhost:3000
    description: Local dev
  - url: https://tagger.mango.internal
    description: Producción (placeholder)

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe (DB + Ollama)
      security: []
      responses:
        '200':
          description: Estado servicios dependientes
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  db: { type: boolean }
                  ollama: { type: boolean }

  /categorizar-movimiento:
    post:
      tags: [Categorización]
      summary: Categoriza un movimiento (endpoint principal)
      description: |
        Cascada: catálogo (bancard_id+codigo) → patrones → MCC → IA fallback async.
        Si todas las capas sync devuelven null, response inmediato es `categoria_id: null`
        y se dispara Ollama en background. Cliente debe poll `/movimientos/:id`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategorizarRequest'
            examples:
              completo:
                value:
                  descripcion: 'BURGER KING SHOPPING DEL SOL'
                  bancard_id: '12345'
                  codigo_comercio: '999'
                  mcc: '5812'
                  monto: 45000
                  origen: 'mobile'
              minimo:
                value:
                  descripcion: 'PETROBRAS RUTA 2'
      responses:
        '200':
          description: Movimiento categorizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategorizarResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /movimientos/{id}:
    get:
      tags: [Categorización]
      summary: Detalle movimiento (incluye resultado de IA si ya terminó)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Detalle
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovimientoDetalle'
        '404':
          $ref: '#/components/responses/NotFound'

  /movimientos/{id}/reprocesar:
    post:
      tags: [Categorización]
      summary: Re-ejecuta cascada + IA fallback sobre un movimiento existente
      description: |
        Útil para:
        - Movimientos viejos sin categoría (creados antes de agregar patrones/MCCs).
        - Movimientos donde IA falló al momento de POST inicial.
        - Mobile permite "re-categorizar este movimiento".

        Reconstruye `MovimientoInput` con los campos almacenados, ejecuta cascada,
        actualiza prediccion + evidencia. Si cascada agotada, dispara IA async
        (cliente debe poll `/movimientos/:id`).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                bypass_catalogo:
                  type: boolean
                  description: Testing — salta capa catálogo, fuerza cascada pura
      responses:
        '200':
          description: Movimiento reprocesado
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/CategorizarResponse'
                  - type: object
                    properties:
                      ia_disparada:
                        type: boolean
                        description: true si cascada agotada y se disparó IA async
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /movimientos/{id}/correccion:
    post:
      tags: [Categorización]
      summary: Corrige manualmente la categoría asignada
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoria_id_nueva]
              properties:
                categoria_id_nueva:
                  type: string
                  format: uuid
                  description: UUID de la categoría correcta (obtener via GET /categorias)
                motivo:
                  type: string
                  maxLength: 500
                  example: 'era taxi, no restaurante'
      responses:
        '200':
          description: Corrección aplicada
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  correccion_id: { type: string, format: uuid }
                  categoria_anterior_id: { type: string, format: uuid, nullable: true }
                  categoria_anterior: { type: string, nullable: true }
                  categoria_nueva_id: { type: string, format: uuid }
                  categoria_nueva: { type: string }
        '404':
          $ref: '#/components/responses/NotFound'

  /categorias:
    get:
      tags: [Recursos]
      summary: Lista categorías disponibles (para dropdowns UI)
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Categoria'

  /memoria/{usuario}:
    get:
      tags: [Memoria]
      summary: Listar memoria de destinatarios del usuario
      description: |
        Devuelve todas las asociaciones `destinatario → categoría` aprendidas para este usuario,
        usadas en la capa de memoria del pipeline para transferencias P2P (MANGO-).
      parameters:
        - in: path
          name: usuario
          required: true
          schema: { type: string, minLength: 1, maxLength: 120 }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  usuario: { type: string }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        destinatario: { type: string, example: PEREZ JUAN }
                        destinatario_normalizado: { type: string, example: PEREZ JUAN }
                        categoria_slug: { type: string, example: alquiler }
                        categoria_nombre: { type: string, example: Alquiler }
                        hits: { type: integer, example: 3 }
                        updated_at: { type: string, format: date-time }
        '400': { description: usuario_invalido }

  /memoria/{usuario}/{destinatario}:
    delete:
      tags: [Memoria]
      summary: Olvidar una asociación específica
      description: |
        Borra la asociación `(usuario, destinatario)` de memoria. La próxima transferencia
        a ese destinatario vuelve a caer en la categoría por defecto del pipeline.
      parameters:
        - in: path
          name: usuario
          required: true
          schema: { type: string, minLength: 1, maxLength: 120 }
        - in: path
          name: destinatario
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
      responses:
        '204': { description: Eliminado }
        '400': { description: usuario_invalido o destinatario_invalido }
        '404': { description: no_existe }

  /patrones-usuario/{usuario}:
    get:
      tags: [PatronesUsuario]
      summary: Lista reglas personales del usuario
      description: |
        Devuelve patrones (regex/contiene/prefijo/literal) que aplican solo a este usuario.
        Se evalúan en capa 1 del pipeline, después de memoria y antes de catálogo.
      parameters:
        - in: path
          name: usuario
          required: true
          schema: { type: string, minLength: 1, maxLength: 120 }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  usuario: { type: string }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        tipo: { type: string, enum: [regex, literal, prefijo, contiene] }
                        valor: { type: string, example: STRIPE }
                        categoria_slug: { type: string, example: software }
                        prioridad: { type: integer, example: 100 }
                        activo: { type: boolean }
                        descripcion: { type: string, nullable: true }
                        hits: { type: integer }
                        created_at: { type: string, format: date-time }
                        updated_at: { type: string, format: date-time }
        '400': { description: usuario_invalido }

  /patrones-usuario/{usuario}/sugerencias:
    get:
      tags: [PatronesUsuario]
      summary: Sugerencias de reglas basadas en correcciones repetidas
      description: |
        Agrupa correcciones del usuario por `nombre_normalizado + categoría`. Devuelve grupos
        donde `veces >= umbral` (default 2). Excluye los nombres con regla activa existente.
      parameters:
        - in: path
          name: usuario
          required: true
          schema: { type: string, minLength: 1, maxLength: 120 }
        - in: query
          name: umbral
          schema: { type: integer, minimum: 1, default: 2 }
      responses:
        '200':
          description: Sugerencias
          content:
            application/json:
              schema:
                type: object
                properties:
                  usuario: { type: string }
                  umbral: { type: integer }
                  sugerencias:
                    type: array
                    items:
                      type: object
                      properties:
                        nombreNormalizado: { type: string }
                        ejemplos: { type: array, items: { type: string } }
                        categoriaSlug: { type: string }
                        categoriaNombre: { type: string }
                        veces: { type: integer }

  /patrones-usuario:
    post:
      tags: [PatronesUsuario]
      summary: Crear regla personal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario, tipo, valor, categoria_slug]
              properties:
                usuario: { type: string, minLength: 1, maxLength: 120 }
                tipo: { type: string, enum: [regex, literal, prefijo, contiene] }
                valor: { type: string, minLength: 2, maxLength: 500 }
                categoria_slug: { type: string }
                prioridad: { type: integer, minimum: 1, maximum: 10000 }
                descripcion: { type: string, nullable: true }
      responses:
        '201': { description: Creado }
        '400': { description: payload_invalido | patron_invalido | valor_muy_corto | categoria_inexistente }
        '409': { description: patron_duplicado }

  /patrones-usuario/{id}:
    patch:
      tags: [PatronesUsuario]
      summary: Activar/desactivar o cambiar prioridad
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                activo: { type: boolean }
                prioridad: { type: integer, minimum: 1, maximum: 10000 }
      responses:
        '200': { description: Actualizado }
        '404': { description: no_existe }
    delete:
      tags: [PatronesUsuario]
      summary: Eliminar regla personal
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Eliminado }
        '404': { description: no_existe }

  /patrones:
    get:
      tags: [Patrones]
      summary: Lista patrones
      parameters:
        - in: query
          name: tipo
          schema: { type: string, enum: [regex, literal, prefijo, contiene] }
        - in: query
          name: categoria_slug
          schema: { type: string }
        - in: query
          name: activo
          schema: { type: boolean }
      responses:
        '200':
          description: Lista
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Patron' }
    post:
      tags: [Patrones]
      summary: Crear patrón
      description: |
        Crea un patrón nuevo. Tipos: `regex` (conf 0.95), `literal` (0.95), `prefijo` (0.90), `contiene` (0.80).
        409 si ya existe `tipo + valor + categoria_slug`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo, valor, categoria_slug]
              properties:
                tipo: { type: string, enum: [regex, literal, prefijo, contiene] }
                valor: { type: string, minLength: 1, maxLength: 500, example: '\bBIGGIE\b' }
                categoria_slug: { type: string, example: supermercado }
                prioridad: { type: integer, minimum: 0, maximum: 10000, default: 100 }
                descripcion: { type: string, maxLength: 200 }
      responses:
        '201':
          description: Creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Patron' }
        '409': { description: patron_duplicado }
        '422': { description: patron_invalido }

  /patrones/{id}:
    get:
      tags: [Patrones]
      summary: Detalle patrón
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Detalle
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Patron' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Patrones]
      summary: Actualizar patrón
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                valor: { type: string, minLength: 1, maxLength: 500 }
                prioridad: { type: integer, minimum: 0, maximum: 10000 }
                descripcion: { type: string, maxLength: 200, nullable: true }
                activo: { type: boolean }
                categoria_slug: { type: string }
      responses:
        '200':
          description: Actualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Patron' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { description: patron_invalido }
    delete:
      tags: [Patrones]
      summary: Borrar patrón
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Borrado }
        '404': { $ref: '#/components/responses/NotFound' }

  /patrones/test:
    post:
      tags: [Patrones]
      summary: Probar match sin persistir
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tipo, valor, texto]
              properties:
                tipo: { type: string, enum: [regex, literal, prefijo, contiene] }
                valor: { type: string, minLength: 1, maxLength: 500 }
                texto: { type: string, minLength: 1, maxLength: 500 }
      responses:
        '200':
          description: Resultado
          content:
            application/json:
              schema:
                type: object
                properties:
                  match: { type: boolean }
                  valor_normalizado: { type: string }
                  texto_normalizado: { type: string }
        '422': { description: patron_invalido }

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    Fuente:
      type: string
      enum:
        - regex # patron tipo regex (0.95)
        - literal # patron tipo literal (0.95)
        - contiene # patron tipo contiene (0.90)
        - prefijo # patron tipo prefijo (0.90)
        - mcc # MCC mapeado (0.75)
        - ia # Ollama fallback (cap 0.70)
        - manual # corrección usuario (1.0)
        - bancard # legacy
        - nombre # legacy
        - patrones # legacy
      description: |
        Fuente que asignó la categoría.
        Pipeline actual produce: `regex`, `literal`, `contiene`, `prefijo`, `mcc`, `ia`.
        Capa catálogo (lookup directo) hereda la fuente almacenada en `comercios_catalogo`.
        Valores legacy (`bancard`, `nombre`, `patrones`) aparecen solo en movimientos antiguos.

    CategorizarRequest:
      type: object
      description: |
        Al menos uno de: `descripcion`, `nombre_comercio`, `nombre_bancard`, `mcc`.
      properties:
        descripcion:
          type: string
          minLength: 1
          maxLength: 500
          description: Texto del movimiento (recomendado)
        nombre_comercio:
          type: string
          minLength: 1
          maxLength: 200
        nombre_bancard:
          type: string
          minLength: 1
          maxLength: 200
        mcc:
          type: string
          pattern: '^\d{2,4}$'
          description: Código MCC
        bancard_id:
          type: string
          maxLength: 100
          description: Habilita lookup directo en catálogo
        codigo_comercio:
          type: string
          maxLength: 50
        monto:
          type: number
          description: Solo persistido, no afecta categorización
        origen:
          type: string
          maxLength: 50
          example: mobile
        batch_id:
          type: string
          maxLength: 100
        bypass_catalogo:
          type: boolean
          description: Testing — salta capa 1

    CategorizarResponse:
      type: object
      required: [movimiento_id, categoria_id, fuente, confianza, requiere_revision]
      properties:
        movimiento_id:
          type: string
          format: uuid
        categoria_id:
          type: string
          format: uuid
          nullable: true
          description: null → cascada agotada, IA corriendo async
        fuente:
          allOf:
            - $ref: '#/components/schemas/Fuente'
          nullable: true
        confianza:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
        requiere_revision:
          type: boolean
          description: true si confianza < 0.7 o categoria null

    MovimientoDetalle:
      type: object
      properties:
        id: { type: string, format: uuid }
        descripcion: { type: string, nullable: true }
        nombre_comercio: { type: string, nullable: true }
        mcc: { type: string, nullable: true }
        monto: { type: number, nullable: true }
        categoria_id: { type: string, format: uuid, nullable: true }
        categoria_slug: { type: string, nullable: true }
        categoria_confirmada_id: { type: string, format: uuid, nullable: true }
        fuente_categoria:
          allOf: [{ $ref: '#/components/schemas/Fuente' }]
          nullable: true
        confianza: { type: number, nullable: true }
        requiere_revision: { type: boolean }
        evidencia:
          type: object
          additionalProperties: true
          nullable: true
        origen: { type: string, nullable: true }
        batch_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Patron:
      type: object
      required: [id, tipo, valor, categoria_id, prioridad, activo]
      properties:
        id: { type: string, format: uuid }
        tipo: { type: string, enum: [regex, literal, prefijo, contiene] }
        valor: { type: string }
        categoria_id: { type: string, format: uuid }
        categoria_slug: { type: string }
        prioridad: { type: integer }
        descripcion: { type: string, nullable: true }
        fuente: { type: string, enum: [manual, catalogo_bancard, auto] }
        activo: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Categoria:
      type: object
      required: [slug, nombre, activo]
      properties:
        slug:
          type: string
          example: transporte
        nombre:
          type: string
          example: Transporte
        descripcion:
          type: string
          nullable: true
        activo:
          type: boolean

    Error:
      type: object
      properties:
        error: { type: string }
        issues:
          type: object
          additionalProperties: true

  responses:
    BadRequest:
      description: Validación falló
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: API key inválida o ausente
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: unauthorized }
    NotFound:
      description: Recurso no existe
      content:
        application/json:
          schema:
            type: object
            properties:
              error: { type: string, example: no_existe }
