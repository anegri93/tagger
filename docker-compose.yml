services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tagger
      POSTGRES_PASSWORD: tagger
      POSTGRES_DB: tagger
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tagger -d tagger']
      interval: 5s
      timeout: 3s
      retries: 10

  tagger:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgres://tagger:tagger@postgres:5432/tagger
      IA_ENABLED: ${IA_ENABLED:-true}
      API_KEY: ${API_KEY:?API_KEY required}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.7}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_POOL_MAX: ${DB_POOL_MAX:-30}
      REGLAS_CACHE_MAX: ${REGLAS_CACHE_MAX:-5000}
      REGLAS_CACHE_TTL_MS: ${REGLAS_CACHE_TTL_MS:-60000}
      # SEED_STRATEGY: auto (default) corre seed solo si hash cambió o DB vacía.
      # Alternativas: 'always' (cada arranque), 'never' (skip), 'skip-poblado' (legacy).
      SEED_STRATEGY: ${SEED_STRATEGY:-auto}
      # IA fallback (capa 4) + /chat — ambos vía OpenRouter.
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_IA_MODEL: ${OPENROUTER_IA_MODEL:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      IA_MAX_CONCURRENT: ${IA_MAX_CONCURRENT:-4}
      PUBLIC_URL: ${PUBLIC_URL:-}
    expose:
      - '3000'

volumes:
  pgdata:
